[tool.black]
line-length = 88

[tool.ruff]
line-length = 120
target-version = "py311"
cache-dir = ".ruff_cache"
extend-exclude = ["node_modules", ".git", ".venv", "dist", "build"]

[tool.ruff.lint]
select = ["E", "F", "W", "C90", "I", "B", "UP", "N", "D"]
ignore = ["C901", "ANN", "D202", "D203", "D212", "E501", "ISC001", "ISC002", "N806"]  # C901 for complex functions, ANN for mypy, D202 for blank line after docstring
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.lint.mccabe]
max-complexity = 10  # Matches radon's default

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D"]
"custom_formatter_example/*" = ["D"]  # Skip docstring checks in tests
"src/config_builder.py" = ["E402", "D100"]
"tests/unit/test_observers.py" = ["F821"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = "tests.*"
disable_error_code = ["no-untyped-def"]

[[tool.mypy.overrides]]
module = "tests.unit.test_formatters"
disable_error_code = ["arg-type"]
